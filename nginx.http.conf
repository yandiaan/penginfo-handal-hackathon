events {
    worker_connections 1024;
}

http {
    # Docker embedded DNS (so nginx can resolve service names at request time)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Allow large uploads (images/videos). Adjust as needed.
    client_max_body_size 250m;

    # HTTP only (no TLS) — suitable for local/first-run bootstrap.
    server {
        listen 80;
        server_name adisai.cobadomain.com www.adisai.cobadomain.com;

        location / {
            set $web_upstream web-frontend:4321;
            proxy_pass http://$web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # keep /api prefix
        location /api/ {
            set $api_upstream api-server:3000;
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            set $api_upstream api-server:3000;
            proxy_pass http://$api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /health {
            set $api_upstream api-server:3000;
            proxy_pass http://$api_upstream/health;
            proxy_set_header Host $host;
        }
    }
}
