events {
    worker_connections 1024;
}

http {
    upstream web {
        server web-frontend:4321;
    }

    upstream api {
        server api-server:3000;
    }

    # HTTP server - untuk ACME challenge dan redirect
    server {
        listen 80;
        server_name adisai.xyz www.adisai.xyz adisai.cobadomain.com adisai.cobadomain.com www.adisai.cobadomain.com http://adisai.cobadomain.com https://adisai.cobadomain.com;

        # ACME challenge untuk certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect semua traffic lain ke HTTPS (setelah cert ada)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server (akan aktif setelah certificate ada)
    server {
        listen 443 ssl http2;
        server_name adisai.xyz www.adisai.xyz adisai.cobadomain.com adisai.cobadomain.com www.adisai.cobadomain.com http://adisai.cobadomain.com https://adisai.cobadomain.com;

        # SSL certificate paths
        ssl_certificate /etc/letsencrypt/live/adisai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/adisai.xyz/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Certbot renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api/health;
            proxy_set_header Host $host;
        }
    }
}
